<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tangent - Multi-thread Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">Tangent</div>
                <button class="new-chat-btn" id="newChatBtn">
                    <span>+</span>
                    <span>New chat</span>
                </button>
            </div>
            <div class="chat-history" id="chatHistory">
                <!-- History items will be added here -->
            </div>
        </div>

        <!-- Main area -->
        <div class="main-area">
            <div class="main-thread">
                <div class="chat-header">
                    <h2>Main Thread</h2>
                    <button id="searchBtn" class="search-btn">🔍 Web Search</button>
                </div>
                <div id="mainMessages" class="messages"></div>
                <div class="input-area">
                    <div class="input-wrapper">
                        <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.gif,.webp,.xlsx,.xls,.pdf,.txt" style="display:none">
                        <button id="attachBtn" class="attach-btn">📎</button>
                        <textarea id="mainInput" placeholder="Message Claude..." rows="1"></textarea>
                        <button id="mainSend">↑</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bubble threads container -->
        <div id="bubbles" class="bubbles-container"></div>
    </div>

    <!-- Bubble template -->
    <template id="bubbleTemplate">
        <div class="bubble">
            <div class="bubble-header">
                <span class="bubble-title">Bubble Thread</span>
                <button class="close-bubble">×</button>
            </div>
            <div class="bubble-messages"></div>
            <div class="bubble-input-area">
                <div class="bubble-input-wrapper">
                    <textarea class="bubble-input" placeholder="Ask details..." rows="1"></textarea>
                    <button class="bubble-send">↑</button>
                </div>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
